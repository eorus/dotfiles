[colors]
background 		= #aa282828
background-alt 	= #44282828
foreground 		= #f5f8f6
foreground-alt 	= #88f5f8f6
black      		= #5b4848
red	    		= #cb6077
red-alt	    	= #44cb6077
green			= #bec55b
yellow			= #e4bc87
blue			= #8ab3d5
magenta    		= #a89bb9
cyan	    	= #7bcdb4
white	    	= #e0d8d6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/top]
;monitor = HDMI3
width = 100%
height = 28
;radius = 6
; Put the bar at the bottom of the screen
bottom = false
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}


;border-size = 2pt
;border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Iosevka:weight=medium:pixelsize=10;0
font-1 = Iosevka:italic:weight=medium:pixelsize=10;0
font-2 = Iosevka:weight=bold:pixelsize=10;0
font-3 = Font Awesome 6 Free:pixelsize=8;2
font-4 = Font Awesome 6 Free Solid:pixelsize=12;2
;font-3 = Font Awesome 6 Brands:pixelsize=12;2
; font-1= "Iosevka Term:pixelsize=12;4"
;font-3 = "Iosevka Term:pixelsize=7;1"

modules-left = xworkspaces xwindow
modules-center = date checkupdates
modules-right = filesystem pulseaudio backlight memory cpu battery temperature wlan powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-detached = false
tray-padding = 2
tray-background = ${colors.secondary}
tray-offset-x = 0
tray-offset-y = 0

; Scale factor for tray clients
tray-scale = 1
; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3
wm-name = i3

override-redirect = false

[module/bspwm]
type = internal/bspwm

; Only show workspaces defined on the same output as the bar
; NOTE: The bspwm and XRandR monitor names must match, which they do by default.
; But if you rename your bspwm monitors with bspc -n this option will no longer
; behave correctly.
; Default: true
pin-workspaces = true

; Output mode flags after focused state label
; Default: false
inline-mode = false

; Create click handler used to focus workspace
; Default: true
enable-click = false

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = false

; Set the scroll cycle direction
; Default: true
reverse-scroll = false

; Use fuzzy (partial) matching on labels when assigning
; icons to workspaces
; Example: code;‚ôö will apply the icon to all workspaces
; containing 'code' in the label
; Default: false
fuzzy-match = true

; Only scroll through occupied workspaces
; Default: false
; New in version 3.6.0
occupied-scroll = true

; ws-icon-[0-9]+ = <label>;<icon>
; Note that the <label> needs to correspond with the bspwm workspace name
; Neither <label> nor <icon> can contain a semicolon (;)
ws-icon-0 = "I; ÔČ©"
ws-icon-1 = "II; ÔĄ†"
ws-icon-2 = "III; ÔĀľ"
ws-icon-3 = "IV; ÔĀĄ"
ws-icon-4 = "V; ÔÉ†"
ws-icon-5 = "VI; ÔÄ•"
ws-icon-6 = "VII; ÔÄ•"
ws-icon-7 = "VIII; ÔÄ•"
ws-icon-8 = "IX; ÔÄ•"
ws-icon-9 = "X; ÔÄ•"
ws-icon-default = ÔÄ•


;An empty module used to add 1 unit spacings whenever needed
[module/sps]
type = custom/text
content = " "
content-padding = 0

[module/backlight]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight

; Enable changing the backlight with the scroll wheel
; NOTE: This may require additional configuration on some systems. Polybar will
; write to `/sys/class/backlight/${self.card}/brightness` which requires polybar
; to have write access to that file.
; DO NOT RUN POLYBAR AS ROOT.
; The recommended way is to add the user to the
; `video` group and give that group write-privileges for the `brightness` file.
; See the ArchWiki for more information:
; https://wiki.archlinux.org/index.php/Backlight#ACPI
; Default: false
enable-scroll = true

; Available tags:
;   <label> (default)
;   <ramp>
;   <bar>
format = <label>
format-foreground = ${colors.blue}
; Available tokens:
;   %percentage% (default)
label = %{T2}ÔÉę %percentage%%%{T-}



[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>
label = BL

bar-width = 10
bar-indicator = |
bar-indicator-foreground = #ff
bar-indicator-font = 2
bar-fill = ‚ĒÄ
bar-fill-font = 2
bar-fill-foreground = #9f78e1
bar-empty = ‚ĒÄ
bar-empty-font = 2
bar-empty-foreground = ${colors.foreground-alt}

[module/backlight-acpi]
inherit = module/xbacklight
type = internal/backlight
card = intel_backlight

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
; Available tags:
;   <label> (default)
format = <label>
format-background = ${colors.bg}
format-foreground = ${colors.green}
format-padding = 4

; Available tokens:
;   %title%
; Default: %title%
label = "%{T1}ÔÄļ %{T-}%{T1} %title%%{T-}"
label-maxlen = 65

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/mpd]
type = internal/mpd
label-song = %artist% - %title%
format-online = ÔÄĀ  <label-song> <icon-prev> <icon-stop> <toggle> <icon-next>
format-offline = "Ô†ė  mpd offline"
icon-prev = " ÔĀČ "
icon-stop = " ÔĀć "
icon-play = " ÔĀč "
icon-pause = " ÔĀĆ "
icon-next = " ÔĀź  "
label-song-maxlen = 75
label-song-ellipsis = true

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
format-charging = <animation-charging> <label-charging>
format-charging-underline = ${colors.primary}
format-discharging = <animation-discharging> <label-discharging>
format-discharging-underline = ${self.format-charging-underline}
format-full-prefix = "ÔĖÉ "
format-full-prefix-foreground = ${colors.foreground-alt}
format-full-underline = ${self.format-charging-underline}
ramp-capacity-0 = 1
ramp-capacity-1 = 2
ramp-capacity-2 = 3
ramp-capacity-foreground = ${colors.foreground-alt}
animation-charging-0 = "ÔĖÖ "
animation-charging-1 = "ÔĖą "
animation-charging-2 = "ÔĖĄ "
animation-charging-foreground = ${colors.foreground-alt}
animation-charging-framerate = 750
animation-discharging-0 = ÔĖĀ
animation-discharging-1 = Ôēĺ
animation-discharging-2 = ÔēĻ
animation-discharging-foreground = ${colors.foreground-alt}
animation-discharging-framerate = 750

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 75
format = <ramp> <label>
format-underline = ${colors.primary}
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}
label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}
ramp-0 = Ôčč
ramp-1 = ÔčČ
ramp-2 = Ôčá
ramp-foreground = ${colors.foreground-alt}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid%
format-connected-underline = ${colors.primary}
format-disconnected = "Ô†ė "

[module/date]
type = internal/date
interval = 1

date = %{T2} ÔÄó %{T-}%{T2} %d/%a%{T-}
time = %{T2} %H:%M%{T-}

date-alt = ÔÄó  %a, %d %b %y |
time-alt = %H:%M:%S

label = %date%%time%
label-font = 4
label-foreground = ${colors.primary}

[module/powermenu]
type = custom/text
content = "‚ŹĽ"
click-left = ~/.config/rofi/powermenu.sh
content-background = ${colors.blue-darker}
content-foreground = ${colors.white}
content-padding = 1
margin-right = 0

[module/checkupdates]
type = custom/script
interval = 900s
exec = ~/.config/polybar/scripts/checkupdates.sh
format-foreground = ${colors.blue}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
